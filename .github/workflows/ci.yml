name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  engine:
    name: DivinationEngine (build + test)
    runs-on: ubuntu-latest
    container:
      image: swift:5.10
    defaults:
      run:
        working-directory: Packages/DivinationEngine
    steps:
      - uses: actions/checkout@v4
      - name: Swift version
        run: swift --version
      - name: Build
        run: swift build -v
      - name: Test
        run: swift test -v

name: ETIC
options:
  bundleIdPrefix: ai.etic
  deploymentTarget:
    iOS: "16.0"
  createIntermediateGroups: true
packages:
  DivinationEngine:
    path: ../Packages/DivinationEngine
targets:
  ETIC:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - ETIC
    dependencies:
      - package: DivinationEngine
        product: DivinationEngine
    info:
      path: ETIC/Info.plist
      properties:
        CFBundleDisplayName: 易卦
        UILaunchScreen: {}
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        # 开发期允许访问本地后端（http://localhost）；上线改为 HTTPS 后移除。
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
        # 摇一摇起卦需读取设备运动数据（M3）。
        NSMotionUsageDescription: 用于摇一摇起卦的运动检测。
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ai.etic.app
        TARGETED_DEVICE_FAMILY: "1,2"
        SWIFT_VERSION: "5.9"
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"

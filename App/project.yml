name: ETIC
options:
  bundleIdPrefix: ai.etic
  defaultLocalization: en
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
packages:
  DivinationEngine:
    path: ../Packages/DivinationEngine
targets:
  ETIC:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - ETIC
    dependencies:
      - package: DivinationEngine
        product: DivinationEngine
    info:
      path: ETIC/Info.plist
      properties:
        CFBundleDisplayName: 易卦
        CFBundleDevelopmentRegion: en
        UILaunchScreen: {}
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        # 开发期允许访问本地后端（http://localhost）；上线改为 HTTPS 后移除。
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
        # 后端解读服务地址（可经此键覆盖 LLMService 的编译期默认值）。
        ETIC_BACKEND_BASE_URL: https://deepwitai.cn/app/etic
        # 摇一摇起卦需读取设备运动数据（M3）。
        NSMotionUsageDescription: Used to detect shake motion for casting hexagrams.
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ai.etic.app
        TARGETED_DEVICE_FAMILY: "1,2"
        SWIFT_VERSION: "5.9"
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        ENABLE_TESTABILITY: "YES"
  ETICTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - ETICTests
    dependencies:
      - target: ETIC
      - package: DivinationEngine
        product: DivinationEngine
    settings:
      base:
        GENERATE_INFOPLIST_FILE: "YES"
        PRODUCT_BUNDLE_IDENTIFIER: ai.etic.app.tests
        TARGETED_DEVICE_FAMILY: "1,2"
        SWIFT_VERSION: "5.9"
